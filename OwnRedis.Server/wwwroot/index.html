<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwnRedis Admin Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --terminal-bg: #0f172a;
            --terminal-text: #38bdf8;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 5px; }

        /* Сетка карточек со статистикой - теперь 4 колонки */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; margin-top: 20px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; position: relative; }
        .stat-card h3 { margin: 0; font-size: 0.8rem; text-transform: uppercase; color: #64748b; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 2.2rem; font-weight: bold; margin: 10px 0; color: var(--primary); }
        .stat-card small { color: #64748b; font-weight: 600; }

        /* Особый стиль для карточки памяти */
        .stat-card.memory { border-left: 4px solid #f59e0b; }

        /* Таблица данных */
        .data-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 30px; }
        .data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .data-table th { background: #f1f5f9; font-weight: 600; font-size: 0.9rem; }

        /* Цвета для уровней хранения */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .badge-ram { background: #dbeafe; color: #1e40af; }
        .badge-fallback { background: #fef3c7; color: #92400e; }
        .badge-database { background: #dcfce7; color: #166534; }

        /* Консоль логов */
        .console-wrapper { margin-top: 30px; }
        .console-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #logs {
            background: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            height: 200px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.3);
        }
        .log-entry { border-bottom: 1px solid #1e293b; padding: 2px 0; }
        .log-entry:last-child { border-bottom: none; }

        .status-online { color: #22c55e; font-size: 0.85rem; display: block; margin-top: 5px; }
        .status-offline { color: #ef4444; }
    </style>
</head>
<body>
<div class="container">
    <h1>OwnRedis Мониторинг</h1>
    <span id="server-status" class="status-online">● Подключено к серверу</span>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Storage (RAM)</h3>
            <div id="ram-count" class="value">0</div>
        </div>
        <div class="stat-card">
            <h3>Fallback</h3>
            <div id="fallback-count" class="value">0</div>
        </div>
        <div class="stat-card">
            <h3>Database (SQL)</h3>
            <div id="db-count" class="value">0</div>
        </div>
        <div class="stat-card memory">
            <h3>Memory Usage</h3>
            <div><span id="mem-usage" class="value">0</span> <small>MB</small></div>
        </div>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>Ключ</th>
            <th>Локация</th>
            <th>Истекает (TTL)</th>
        </tr>
        </thead>
        <tbody id="keys-table-body">
        <tr><td colspan="3" style="text-align:center;">Загрузка данных...</td></tr>
        </tbody>
    </table>

    <div class="console-wrapper">
        <div class="console-header">
            <h3>System Console</h3>
            <small style="color: #64748b;">Live Updates</small>
        </div>
        <div id="logs">
            <div class="log-entry">Инициализация консоли...</div>
        </div>
    </div>
</div>

<script>
    async function fetchStats() {
        try {
            const response = await fetch('/api/admin/stats');
            if (!response.ok) throw new Error("Server Error");

            const data = await response.json();

            // 1. Обновляем счетчики и память
            document.getElementById('ram-count').innerText = data.storageCount ?? 0;
            document.getElementById('fallback-count').innerText = data.fallbackCount ?? 0;
            document.getElementById('db-count').innerText = data.databaseCount ?? 0;
            document.getElementById('mem-usage').innerText = data.memoryUsage ?? 0;

            // 2. Обновляем таблицу ключей
            const tableBody = document.getElementById('keys-table-body');
            const keys = data.allKeys || [];

            if (keys.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: #64748b;">Хранилище пусто</td></tr>';
            } else {
                tableBody.innerHTML = keys.map(item => `
                    <tr>
                        <td><strong>${item.key}</strong></td>
                        <td><span class="badge badge-${item.location.toLowerCase()}">${item.location}</span></td>
                        <td>${new Date(item.ttl).toLocaleString()}</td>
                    </tr>
                `).join('');
            }

            // 3. Обновляем логи
            const logsDiv = document.getElementById('logs');
            if (data.logs && data.logs.length > 0) {
                // Выводим логи (они уже приходят развернутыми с сервера)
                logsDiv.innerHTML = data.logs.map(line => `<div class="log-entry">${line}</div>`).join('');
            }

            // Статус
            const status = document.getElementById('server-status');
            status.innerText = "● Подключено к серверу (Обновлено: " + new Date().toLocaleTimeString() + ")";
            status.className = "status-online";

        } catch (error) {
            console.error("Ошибка обновления:", error);
            const status = document.getElementById('server-status');
            status.innerText = "○ Ошибка соединения с API";
            status.className = "status-online status-offline";
        }
    }

    // Запуск опроса каждые 2 секунды для большей "живости"
    setInterval(fetchStats, 2000);
    fetchStats();
</script>
</body>
</html>
